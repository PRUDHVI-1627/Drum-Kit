<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <h1 class="header">DRUM <span>KIT</span></h1>
 
    <div id="keypad">
        <button id="keyW" class="drum">
            <img src="image/tom1.png" alt="Tom 1">
            <span class="key-label">W</span>
        </button>
        <button id="keyA" class="drum">
            <img src="image/tom2.png" alt="Tom 2">
            <span class="key-label">A</span>
        </button>
        <button id="keyS" class="drum">
            <img src="image/tom3.png" alt="Tom 3">
            <span class="key-label">S</span>
        </button>
        <button id="keyD" class="drum">
            <img src="image/tom4.png" alt="Tom 4">
            <span class="key-label">D</span>
        </button>
        <button id="keyJ" class="drum">
            <img src="image/snare.png" alt="Snare">
            <span class="key-label">J</span>
        </button>
        <button id="keyK" class="drum">
            <img src="image/crash.png" alt="Crash">
            <span class="key-label">K</span>
        </button>
        <button id="keyL" class="drum">
            <img src="image/kick.png" alt="Kick Bass">
            <span class="key-label">L</span>
        </button>
    </div>
 
    <p class="hint">press keys or click to play</p>
    <script src="script.js"></script>
</body>
</html>
